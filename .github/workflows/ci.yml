name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  python:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest src/tests/ -v --tb=short

      - name: Lint
        run: python -m flake8 src/vortex_pqc/ --max-line-length=100
        continue-on-error: true

      - name: Type-check
        run: python -m mypy src/vortex_pqc/ --ignore-missing-imports
        continue-on-error: true

  c-library:
    name: C library / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build and test C library
        run: make -C c test
